<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | Real Estate Operations Dashboard</title>
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>
  <main class="auth-wrapper">
    <section class="auth-card">
      <div class="brand">
        <span class="brand-badge">Backend Demo</span>
        <h1>Create Account</h1>
        <p class="subtitle">Register a demo admin user for the real estate operations system.</p>
      </div>

      <div id="registerMessage" class="message"></div>

      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" required />
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" minlength="6" required />
        </div>
        <button class="btn" type="submit">Create Account</button>
      </form>

      <p class="auth-footer">Already have an account? <a href="/login.html">Login</a></p>
    </section>
  </main>

  <script src="/js/config.js"></script>
  <script src="/js/session.js"></script>
  <script src="/js/register.js"></script>
</body>
</html>
