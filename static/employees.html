<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agents | Real Estate Operations Dashboard</title>
  <link rel="stylesheet" href="/css/ams-theme.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="logo">
        <span class="logo-badge">Real Estate Ops</span>
        <h2>Listing & Agent Management</h2>
        <p>Backend-focused demo</p>
      </div>
      <nav class="nav">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/assets.html">Listings</a>
        <a class="active" href="/employees.html">Agents</a>
        <a href="/locations.html">Offices</a>
        <button onclick="logout()">Logout</button>
      </nav>
      <div class="sidebar-footer">Logged in as<br /><strong data-user-name>Loading...</strong></div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div><h1>Agents</h1><p>Manage agents and connect them with offices and assigned listings.</p></div>
        <div class="user-chip">Agent Module</div>
      </header>

      <div id="agentMessage" class="message"></div>

      <section class="content-grid">
        <div class="card form-card">
          <h2 id="formTitle">Add Agent</h2>
          <form id="agentForm">
            <div class="form-group">
              <label for="agentName">Agent Name</label>
              <input id="agentName" type="text" required />
            </div>
            <div class="form-group">
              <label for="agentEmail">Email</label>
              <input id="agentEmail" type="email" required />
            </div>
            <div class="form-group">
              <label for="agentPhone">Phone</label>
              <input id="agentPhone" type="text" />
            </div>
            <div class="form-group">
              <label for="agentSpecialization">Specialization</label>
              <select id="agentSpecialization">
                <option value="">Select specialization</option>
                <option value="Rentals">Rentals</option>
                <option value="Sales">Sales</option>
                <option value="Commercial">Commercial</option>
                <option value="Property Management">Property Management</option>
              </select>
            </div>
            <div class="form-group">
              <label for="agentLocation">Office</label>
              <select id="agentLocation"></select>
            </div>
            <div class="form-group">
              <label for="agentStatus">Status</label>
              <select id="agentStatus">
                <option value="Active">Active</option>
                <option value="Inactive">Inactive</option>
              </select>
            </div>
            <div class="form-actions">
              <button id="saveAgentBtn" class="btn" type="submit">Save Agent</button>
              <button id="cancelEditBtn" class="btn secondary" type="button" style="display: none;">Cancel</button>
            </div>
          </form>
        </div>

        <section class="card table-card">
          <h2>Agent Records</h2>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Agent</th><th>Email</th><th>Phone</th><th>Specialization</th>
                  <th>Office</th><th>Listings</th><th>Status</th><th>Actions</th>
                </tr>
              </thead>
              <tbody id="agentsBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <script src="/js/config.js"></script>
  <script src="/js/session.js"></script>
  <script src="/js/employees.js"></script>
</body>
</html>
